<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Rosière 2026 — Programme</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  /* Neutral palette — warm undertone */
  --bg:#f7f7f5;
  --surface:#ffffff;
  --surface-raised:#fafaf8;
  --border:#ebebea;
  --border-focus:#c8c8c6;
  --text:#1a1a1a;
  --text-secondary:#717171;
  --text-tertiary:#a0a0a0;
  --accent:#2b2b2b;
  --accent-hover:#404040;
  --accent-subtle:rgba(43,43,43,.06);

  /* Tier palette — muted, sophisticated */
  --sig:#f5f1ea;--sig-b:#d4c9b2;--sig-t:#7a6b4e;
  --dist:#edf1f8;--dist-b:#b0c2db;--dist-t:#4a6585;
  --elite:#ecf3e9;--elite-b:#a6cfa0;--elite-t:#467a3e;
  --exc:#f2ecf6;--exc-b:#c5aad2;--exc-t:#6e4582;
  --prem:#fbf2e3;--prem-b:#d9b55a;--prem-t:#806020;

  /* Grid sizing */
  --cw:108px;--ch:72px;--g:3px;--pp:31px;

  /* Motion */
  --ease-out:cubic-bezier(.23,1,.32,1);
  --ease-in-out:cubic-bezier(.77,0,.175,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
  --duration-fast:120ms;
  --duration-normal:200ms;
  --duration-slow:350ms;

  /* Radius */
  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:14px;
  --radius-xl:20px;
}

body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
}

/* ━━━ TOPBAR ━━━ */
.topbar{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 24px;
  height:56px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;top:0;z-index:20;
}
.topbar-left{display:flex;align-items:center;gap:12px}
.logo-crown{display:block}
.topbar-crown{height:20px;width:auto}
.login-crown{height:32px;width:auto;margin-bottom:12px}
.logo{font-size:15px;font-weight:700;letter-spacing:-.4px;color:var(--text)}
.logo-sub{font-size:11px;color:var(--text-tertiary);font-weight:400;margin-left:8px}
.topbar-right{display:flex;align-items:center;gap:8px}

/* Chips / stats */
.stat-chips{display:flex;gap:6px;margin-right:8px}
.chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;
  background:var(--accent-subtle);
  border-radius:100px;
  font-size:11px;font-weight:500;
  color:var(--text-secondary);
}
.chip strong{color:var(--text);font-weight:600}

/* Buttons — ghost & solid */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:7px 14px;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  background:var(--surface);
  font-size:12px;font-weight:500;font-family:inherit;
  color:var(--text-secondary);
  cursor:pointer;
  transition:background var(--duration-fast) ease,
             border-color var(--duration-fast) ease,
             color var(--duration-fast) ease,
             transform var(--duration-fast) var(--ease-out);
  white-space:nowrap;
}
.btn:active{transform:scale(.97)}
@media(hover:hover)and(pointer:fine){.btn:hover{background:var(--surface-raised);border-color:var(--border-focus);color:var(--text)}}

.btn-solid{
  background:var(--accent);color:#fff;border-color:var(--accent);
}
@media(hover:hover)and(pointer:fine){.btn-solid:hover{background:var(--accent-hover);border-color:var(--accent-hover)}}

.btn-icon{
  width:34px;height:34px;padding:0;
  border-radius:var(--radius-sm);
}
.btn-icon svg{width:16px;height:16px}

.btn-text{border:none;background:none;padding:4px 8px;color:var(--text-tertiary)}
@media(hover:hover)and(pointer:fine){.btn-text:hover{color:var(--text);background:var(--accent-subtle)}}

/* User bar */
.user-info{
  display:flex;align-items:center;gap:8px;
  padding-left:12px;
  border-left:1px solid var(--border);
  margin-left:4px;
  font-size:11px;color:var(--text-tertiary);
}
.user-info strong{color:var(--text);font-weight:600}
.btn-logout{
  padding:4px 8px;border-radius:var(--radius-sm);
  background:none;border:1px solid var(--border);
  font-size:10px;font-weight:500;cursor:pointer;
  color:var(--text-tertiary);font-family:inherit;
  transition:all var(--duration-fast) ease;
}
@media(hover:hover)and(pointer:fine){.btn-logout:hover{background:var(--accent-subtle);color:var(--text)}}

/* ━━━ LAYOUT ━━━ */
.app{display:flex;height:calc(100vh - 56px);height:calc(100dvh - 56px)}

/* ━━━ SIDEBAR ━━━ */
.sidebar{
  width:320px;min-width:320px;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}

.sb-section{padding:16px 18px;border-bottom:1px solid var(--border)}
.sb-section:last-child{border-bottom:none}
.sb-title{
  font-size:11px;font-weight:600;
  color:var(--text-tertiary);
  text-transform:uppercase;
  letter-spacing:.6px;
  margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;
}
.sb-title .count{
  font-size:10px;font-weight:700;
  background:var(--accent-subtle);
  color:var(--text-secondary);
  padding:2px 7px;border-radius:100px;
  text-transform:none;letter-spacing:0;
}

/* Add form */
.add-form{display:flex;flex-direction:column;gap:8px}
.input{
  padding:9px 12px;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  font-size:13px;font-family:inherit;
  outline:none;
  background:var(--bg);
  color:var(--text);
  transition:border-color var(--duration-fast) ease,
             background var(--duration-fast) ease,
             box-shadow var(--duration-fast) ease;
}
.input:focus{
  border-color:var(--border-focus);
  background:var(--surface);
}
.input:focus-visible{
  box-shadow:0 0 0 3px rgba(43,43,43,.08);
}
.input::placeholder{color:var(--text-tertiary)}

/* Tier selector — pill style */
.tier-pills{display:flex;gap:3px}
.tier-pill{
  flex:1;padding:6px 2px;
  border:1.5px solid transparent;
  border-radius:var(--radius-sm);
  cursor:pointer;text-align:center;
  font-size:10px;font-weight:600;font-family:inherit;
  transition:border-color var(--duration-fast) ease,
             box-shadow var(--duration-fast) ease,
             transform 80ms var(--ease-out);
}
.tier-pill:active{transform:scale(.95)}
.tier-pill[data-tier="70"]{background:var(--sig);color:var(--sig-t)}
.tier-pill[data-tier="140"]{background:var(--dist);color:var(--dist-t)}
.tier-pill[data-tier="250"]{background:var(--elite);color:var(--elite-t)}
.tier-pill[data-tier="500"]{background:var(--exc);color:var(--exc-t)}
.tier-pill[data-tier="2000"]{background:var(--prem);color:var(--prem-t)}
.tier-pill.active{border-color:currentColor;box-shadow:0 0 0 1px currentColor}

/* Capacity */
.cap-grid{display:grid;grid-template-columns:1fr auto auto;gap:2px 8px;font-size:11px;align-items:center}
.cap-label{font-weight:600}.cap-count{text-align:right;color:var(--text-secondary);font-weight:500}.cap-avail{text-align:right;color:var(--text-tertiary);font-size:10px}
.cap-bar{grid-column:1/-1;height:3px;background:var(--border);border-radius:2px;margin:8px 0 4px;overflow:hidden}
.cap-bar-fill{height:100%;border-radius:2px;transition:width .6s var(--ease-out)}
.cap-summary{font-size:10px;color:var(--text-tertiary);text-align:center}

/* Filter tabs */
.filter-tabs{display:flex;gap:2px;background:var(--bg);border-radius:var(--radius-sm);padding:2px;margin-top:10px}
.filter-tab{
  flex:1;padding:5px 8px;
  border:none;border-radius:4px;
  background:transparent;
  font-size:10px;font-weight:500;font-family:inherit;
  color:var(--text-tertiary);cursor:pointer;
  transition:background var(--duration-fast) ease,
             color var(--duration-fast) ease,
             transform 80ms var(--ease-out);
  text-align:center;
}
.filter-tab:active{transform:scale(.96)}
.filter-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.06)}

/* Tier filter chips */
.tier-filters{display:flex;gap:3px;margin-top:8px;flex-wrap:wrap}
.tier-chip{
  padding:3px 8px;
  border:1.5px solid var(--border);
  border-radius:100px;
  background:var(--surface);
  font-size:9px;font-weight:600;font-family:inherit;
  color:var(--text-tertiary);cursor:pointer;
  transition:all var(--duration-fast) ease;
}
.tier-chip:active{transform:scale(.95)}
.tier-chip.active{border-color:currentColor}
.tier-chip[data-tier="70"].active{background:var(--sig);color:var(--sig-t);border-color:var(--sig-b)}
.tier-chip[data-tier="140"].active{background:var(--dist);color:var(--dist-t);border-color:var(--dist-b)}
.tier-chip[data-tier="250"].active{background:var(--elite);color:var(--elite-t);border-color:var(--elite-b)}
.tier-chip[data-tier="500"].active{background:var(--exc);color:var(--exc-t);border-color:var(--exc-b)}
.tier-chip[data-tier="2000"].active{background:var(--prem);color:var(--prem-t);border-color:var(--prem-b)}

/* Search input with icon */
.search-wrap{
  position:relative;
  margin-top:10px;
}
.search-wrap .search-icon{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  color:var(--text-tertiary);pointer-events:none;
  width:14px;height:14px;
}
.search-wrap .input{
  width:100%;padding-left:30px;
  font-size:12px;
}
.search-wrap .search-clear{
  position:absolute;right:6px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text-tertiary);
  cursor:pointer;font-size:14px;padding:2px 4px;
  display:none;line-height:1;border-radius:3px;
  transition:color 80ms ease;
}
.search-wrap .search-clear.visible{display:block}
@media(hover:hover)and(pointer:fine){.search-wrap .search-clear:hover{color:var(--text)}}

/* Input with icon */
.input-wrap{position:relative}
.input-wrap .input-icon{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  color:var(--text-tertiary);pointer-events:none;
  width:14px;height:14px;
}
.input-wrap .input{width:100%;padding-left:30px}

/* Icon inside button */
.btn svg.btn-svg{width:14px;height:14px;flex-shrink:0}

/* Sponsor list */
.sponsor-list{flex:1;overflow-y:auto;padding:6px 10px}
.sponsor-list::-webkit-scrollbar{width:4px}
.sponsor-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.sponsor-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;
  border-radius:var(--radius-sm);
  margin-bottom:2px;
  font-size:12px;
  cursor:default;
  position:relative;
  transition:box-shadow var(--duration-normal) var(--ease-out),
             transform var(--duration-normal) var(--ease-out);
}
@media(hover:hover)and(pointer:fine){
  .sponsor-row:hover{box-shadow:0 2px 8px rgba(0,0,0,.05);transform:translateY(-.5px)}
}
.sponsor-row[data-tier="70"]{background:var(--sig)}
.sponsor-row[data-tier="140"]{background:var(--dist)}
.sponsor-row[data-tier="250"]{background:var(--elite)}
.sponsor-row[data-tier="500"]{background:var(--exc)}
.sponsor-row[data-tier="2000"]{background:var(--prem)}

.sponsor-row input[type="checkbox"]{accent-color:var(--accent);width:13px;height:13px}
.sponsor-row .s-name{flex:1;font-weight:600;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.sponsor-row .s-price{font-size:10px;color:var(--text-tertiary);font-weight:600}
.sponsor-row .s-page-badge{
  font-size:8px;font-weight:600;
  background:rgba(0,0,0,.05);
  padding:2px 7px;border-radius:100px;
  color:var(--text-secondary);
  white-space:nowrap;
}
.sponsor-row .s-page-badge.pinned{background:#fce8c8;color:#9a6520}
.sponsor-row .s-del{
  opacity:0;background:none;border:none;
  color:#c44;cursor:pointer;font-size:14px;
  padding:0 2px;line-height:1;
  transition:opacity 80ms ease;
}
.sponsor-row:hover .s-del{opacity:.4}
.sponsor-row:hover .s-del:hover{opacity:1}
.sponsor-row.placed .s-name{color:var(--text-tertiary)}

/* Sponsor image indicator */
.s-img-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:16px;height:16px;border-radius:3px;flex-shrink:0;
}
.s-img-badge svg{width:12px;height:12px}
.s-img-badge.has-img{color:#467a3e;background:rgba(70,122,62,.1)}
.s-img-badge.no-img{color:var(--text-tertiary);opacity:.3}

/* Block image dot (grid) */
.sb .img-dot{
  position:absolute;bottom:3px;right:3px;
  width:6px;height:6px;border-radius:50%;
  background:#467a3e;border:1px solid rgba(255,255,255,.6);
  z-index:4;
}

/* Modal image section */
.modal-img-section{margin-bottom:14px}
.modal-img-preview{
  position:relative;display:inline-block;
  margin-top:8px;border-radius:var(--radius-sm);
  overflow:hidden;border:1px solid var(--border);
}
.modal-img-preview img{
  display:block;max-width:100%;max-height:120px;
  object-fit:contain;background:var(--bg);
}
.modal-img-preview .img-remove{
  position:absolute;top:4px;right:4px;
  background:rgba(0,0,0,.6);color:#fff;
  border:none;border-radius:50%;width:20px;height:20px;
  font-size:12px;line-height:1;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 100ms ease;
}
.modal-img-preview:hover .img-remove{opacity:1}
.modal-img-attach{
  display:inline-flex;align-items:center;gap:5px;
  margin-top:8px;padding:6px 12px;
  border:1.5px dashed var(--border);border-radius:var(--radius-sm);
  background:var(--bg);cursor:pointer;
  font-size:11px;font-weight:500;color:var(--text-secondary);
  font-family:inherit;
  transition:border-color var(--duration-fast) ease,background var(--duration-fast) ease;
}
@media(hover:hover)and(pointer:fine){.modal-img-attach:hover{border-color:var(--border-focus);background:var(--surface)}}

.empty-state{
  color:var(--text-tertiary);text-align:center;
  padding:40px 20px;font-size:12px;line-height:1.6;
}

/* Bottom actions */
.sb-actions{
  display:flex;gap:4px;
  padding:12px 18px;
  border-top:1px solid var(--border);
  background:var(--surface-raised);
}
.sb-actions .btn{flex:1;font-size:10px;padding:6px 4px;text-align:center;justify-content:center}

/* ━━━ CANVAS (main area) ━━━ */
.canvas{
  flex:1;overflow-y:auto;
  padding:32px 24px;
  display:flex;flex-direction:column;align-items:center;gap:24px;
}

/* Spread */
.spread{display:flex;gap:0;align-items:stretch}
.spread-spine{width:1px;background:linear-gradient(180deg,transparent,var(--border-focus),transparent);margin:12px 0;flex-shrink:0}
.page-wrap{display:flex;flex-direction:column;align-items:center}
.page-header{
  font-size:9px;color:var(--text-tertiary);
  font-weight:500;margin-bottom:4px;
  text-align:center;
  letter-spacing:.2px;
  max-width:calc(4*var(--cw)+3*var(--g)+2*var(--pp));
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  line-height:1.2;
}
.page-header strong{color:var(--text-secondary);font-weight:600}

.pg-grid{
  display:grid;
  grid-template-columns:repeat(4,var(--cw));
  grid-template-rows:repeat(4,var(--ch));
  gap:var(--g);
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-md);
  padding:var(--pp);
  position:relative;
  box-shadow:0 1px 3px rgba(0,0,0,.03),0 6px 24px rgba(0,0,0,.02);
  min-height:calc(4*var(--ch)+3*var(--g)+2*var(--pp));
}
.pg-grid.no-sponsors{pointer-events:none}
.pg-grid.no-sponsors .cell{border:none}

.cell{
  border:1.5px dashed var(--border);
  border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:var(--text-tertiary);
  cursor:pointer;
  transition:background var(--duration-fast) ease,
             border-color var(--duration-fast) ease;
}
@media(hover:hover)and(pointer:fine){
  .cell:hover{background:var(--accent-subtle);border-color:var(--border-focus)}
}
.cell.occupied{border:none;cursor:default}
.cell.occupied:hover{background:transparent}
.cell.blocked{
  background:var(--bg);
  border:1px solid var(--border);
  cursor:default;pointer-events:none;
  position:relative;
}
.cell.blocked::after{
  content:'';position:absolute;inset:4px;
  background:repeating-linear-gradient(-45deg,transparent,transparent 3px,var(--border) 3px,var(--border) 3.5px);
  border-radius:2px;opacity:.3;
}

/* Sponsor block */
.sb{
  position:absolute;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:var(--radius-sm);
  border:1.5px solid;
  cursor:grab;user-select:none;z-index:3;
  text-align:center;padding:4px;
  transition:box-shadow var(--duration-normal) var(--ease-out),
             transform var(--duration-normal) var(--ease-out);
}
@media(hover:hover)and(pointer:fine){
  .sb:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-1px)}
}
.sb:active{cursor:grabbing;transform:scale(.98)!important}
.sb[data-tier="70"]{background:var(--sig);border-color:var(--sig-b)}
.sb[data-tier="140"]{background:var(--dist);border-color:var(--dist-b)}
.sb[data-tier="250"]{background:var(--elite);border-color:var(--elite-b)}
.sb[data-tier="500"]{background:var(--exc);border-color:var(--exc-b)}
.sb[data-tier="2000"]{background:var(--prem);border-color:var(--prem-b)}
.sb .bn{font-weight:700;font-size:11px;color:var(--text);line-height:1.2;word-break:break-word;overflow:hidden;max-width:100%}
.sb .bp{font-size:9px;color:var(--text-tertiary);font-weight:600;margin-top:1px}
.sb .ba{position:absolute;top:3px;right:3px;display:flex;gap:2px;opacity:0;transition:opacity 80ms ease}
.sb:hover .ba{opacity:1}
.ba button{
  background:rgba(255,255,255,.9);border:1px solid rgba(0,0,0,.08);
  border-radius:4px;font-size:10px;cursor:pointer;
  padding:2px 5px;color:var(--text-secondary);
  line-height:1.1;font-family:inherit;
  transition:background 80ms ease;
}
@media(hover:hover)and(pointer:fine){.ba button:hover{background:#fff;border-color:rgba(0,0,0,.15)}}
.ba .rm{color:#c44}

/* Tool buttons on page header */
.page-tool{
  display:inline-block;margin-left:4px;
  padding:1px 6px;border:1px solid var(--border);
  border-radius:4px;background:var(--surface);
  font-size:8px;font-weight:600;color:var(--text-tertiary);
  cursor:pointer;font-family:inherit;vertical-align:middle;
  transition:all var(--duration-fast) ease;
}
@media(hover:hover)and(pointer:fine){.page-tool:hover{background:var(--accent-subtle);border-color:var(--border-focus);color:var(--text-secondary)}}
.page-tool-danger{color:#c44!important;border-color:#e8c4c4!important}
@media(hover:hover)and(pointer:fine){.page-tool-danger:hover{background:#fff0f0!important}}

/* Page background */
.pg-bg{position:absolute;inset:0;border-radius:9px;z-index:1;pointer-events:none;object-fit:cover;width:100%;height:100%}
.pg-grid.has-bg .cell{position:relative}
.pg-grid.has-bg .cell:not(.blocked){z-index:2;border-color:rgba(255,255,255,.35)}
.pg-grid.has-bg .cell.blocked{z-index:0}
.pg-grid.has-bg .cell.blocked::after{display:none}
.pg-grid.has-bg{background:var(--surface)}

.drop-hl{background:var(--accent-subtle)!important;border-color:var(--border-focus)!important;border-style:solid!important}

/* ━━━ MODAL ━━━ */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0);
  z-index:50;
  align-items:center;justify-content:center;
  transition:background var(--duration-normal) ease;
}
.modal-overlay.open{display:flex;background:rgba(0,0,0,.2)}

.modal{
  background:var(--surface);
  border-radius:var(--radius-lg);
  padding:20px 24px;
  box-shadow:0 16px 48px rgba(0,0,0,.14),0 0 0 1px rgba(0,0,0,.04);
  min-width:260px;max-width:360px;
  max-height:80vh;overflow-y:auto;
  animation:modalPop var(--duration-slow) var(--ease-out);
}
@keyframes modalPop{from{opacity:0;transform:scale(.96) translateY(4px)}to{opacity:1;transform:scale(1) translateY(0)}}

.modal h3{font-size:14px;font-weight:700;margin-bottom:4px;color:var(--text)}
.modal .modal-sub{font-size:11px;color:var(--text-tertiary);margin-bottom:14px}
.modal .modal-options{display:flex;flex-direction:column;gap:3px}

.modal-opt{
  padding:8px 12px;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  background:var(--surface-raised);
  cursor:pointer;font-size:11px;
  font-family:inherit;font-weight:500;
  color:var(--text-secondary);
  text-align:left;
  transition:background var(--duration-fast) ease,
             border-color var(--duration-fast) ease,
             transform 80ms var(--ease-out);
}
@media(hover:hover)and(pointer:fine){.modal-opt:hover{background:var(--accent-subtle);border-color:var(--border-focus)}}
.modal-opt:active:not(:disabled){transform:scale(.98)}
.modal-opt.cur{border-color:var(--accent);background:rgba(43,43,43,.04);font-weight:600}
.modal-opt:disabled{opacity:.3;cursor:default}
.modal-opt .m-pg{color:var(--text-tertiary);font-weight:400;font-size:10px}

.unpin-btn{
  color:#c44!important;border-color:#e8c4c4!important;
  background:#fff5f5!important;font-weight:600!important;
  text-align:center!important;display:flex;align-items:center;justify-content:center;
}
@media(hover:hover)and(pointer:fine){.unpin-btn:hover{background:#ffe8e8!important;border-color:#d4a0a0!important}}

.modal-cancel{
  margin-top:10px;padding:7px;width:100%;
  border:none;background:var(--bg);
  border-radius:var(--radius-sm);
  font-size:11px;font-weight:500;
  cursor:pointer;color:var(--text-tertiary);
  font-family:inherit;
  transition:background var(--duration-fast) ease;
}
@media(hover:hover)and(pointer:fine){.modal-cancel:hover{background:var(--border)}}

.modal-sep{
  font-size:9px;color:var(--text-tertiary);
  text-transform:uppercase;letter-spacing:.8px;
  margin:10px 0 4px;font-weight:600;
}

/* Tier switcher in modal */
.modal-tier-wrap{margin-bottom:14px}
.modal-tier-pills{display:flex;gap:3px;margin-top:6px}
.modal-tier-pill{
  flex:1;padding:7px 2px;
  border:1.5px solid transparent;
  border-radius:var(--radius-sm);
  cursor:pointer;text-align:center;
  font-size:10px;font-weight:600;font-family:inherit;
  transition:border-color var(--duration-fast) ease,
             box-shadow var(--duration-fast) ease,
             transform 80ms var(--ease-out);
  display:flex;flex-direction:column;align-items:center;gap:1px;
}
.modal-tier-pill:active{transform:scale(.95)}
.modal-tier-pill[data-tier="70"]{background:var(--sig);color:var(--sig-t)}
.modal-tier-pill[data-tier="140"]{background:var(--dist);color:var(--dist-t)}
.modal-tier-pill[data-tier="250"]{background:var(--elite);color:var(--elite-t)}
.modal-tier-pill[data-tier="500"]{background:var(--exc);color:var(--exc-t)}
.modal-tier-pill[data-tier="2000"]{background:var(--prem);color:var(--prem-t)}
.modal-tier-pill.active{border-color:currentColor;box-shadow:0 0 0 1px currentColor}
.modal-tier-pill .pill-label{font-size:8px;font-weight:500;opacity:.7}
.modal-tier-pill .pill-size{font-size:7px;font-weight:400;opacity:.5}

/* ━━━ TOAST ━━━ */
.toast{
  position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;
  transform:translateX(-50%) translateY(8px);
  background:var(--accent);color:#fff;
  padding:10px 20px;border-radius:var(--radius-md);
  font-size:12px;font-weight:500;
  opacity:0;pointer-events:none;
  transition:transform var(--duration-slow) var(--ease-out),
             opacity var(--duration-normal) ease;
  z-index:100;
  box-shadow:0 8px 24px rgba(0,0,0,.15);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}

/* ━━━ FLIPBOOK ━━━ */
.fb-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(8,8,12,.94);
  z-index:200;flex-direction:column;
  align-items:center;justify-content:center;
  backdrop-filter:blur(12px);
  cursor:pointer;
}
.fb-overlay.open{display:flex}
.fb-top{position:absolute;top:0;left:0;right:0;display:flex;justify-content:center;align-items:center;padding:18px;z-index:210;pointer-events:none}
.fb-counter{color:rgba(255,255,255,.4);font-size:12px;font-weight:500;font-family:'Inter',sans-serif}
.fb-close-btn{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.7);
  font-size:20px;cursor:pointer;
  padding:8px 14px;border-radius:var(--radius-sm);
  position:absolute;top:14px;right:20px;
  font-family:'Inter',sans-serif;line-height:1;
  z-index:999;pointer-events:all;
  transition:background var(--duration-fast) ease,
             color var(--duration-fast) ease;
}
@media(hover:hover)and(pointer:fine){.fb-close-btn:hover{background:rgba(255,255,255,.14);color:#fff}}

.fb-body{display:flex;align-items:center;gap:0;cursor:default;position:relative;z-index:205}
.fb-spread{
  display:flex;gap:0;
  box-shadow:0 12px 48px rgba(0,0,0,.4);
  border-radius:4px;overflow:hidden;
  transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s ease;
}
.fb-page{position:relative;background:#fff;overflow:hidden}
.fb-page.left{border-right:1px solid #e8e8e8}
.fb-page .fb-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.fb-page .fb-svg{position:absolute;z-index:1}
.fb-page .fb-svg svg{width:100%;height:100%;display:block}
.fb-page .fb-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(0,0,0,.15);font-size:14px;font-weight:500;font-family:'Inter',sans-serif;text-align:center;padding:24px}

.fb-nav-btn{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.06);
  color:rgba(255,255,255,.6);
  font-size:28px;cursor:pointer;
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:0 14px;
  transition:background var(--duration-fast) ease,
             color var(--duration-fast) ease,
             transform 80ms var(--ease-out);
  font-family:sans-serif;flex-shrink:0;z-index:210;
}
@media(hover:hover)and(pointer:fine){.fb-nav-btn:hover{background:rgba(255,255,255,.12);color:#fff}}
.fb-nav-btn:active:not(:disabled){transform:scale(.9)}
.fb-nav-btn:disabled{opacity:.1;cursor:default;pointer-events:none}

.fb-footer{position:absolute;bottom:18px;left:0;right:0;text-align:center;z-index:210;pointer-events:none}
.fb-footer span{
  color:rgba(255,255,255,.35);font-size:11px;
  font-family:'Inter',sans-serif;font-weight:500;
  background:rgba(0,0,0,.25);
  padding:4px 14px;border-radius:100px;
}

/* ━━━ LOGIN ━━━ */
.login-overlay{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
}
.login-card{
  background:var(--surface);
  border-radius:var(--radius-lg);
  border:1px solid var(--border);
  padding:40px 36px;
  width:360px;
  box-shadow:0 16px 48px rgba(0,0,0,.06),0 0 0 1px rgba(0,0,0,.02);
  animation:loginSlide .5s var(--ease-out);
}
@keyframes loginSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.login-card h2{font-size:20px;font-weight:700;margin-bottom:4px;color:var(--text);letter-spacing:-.3px}
.login-card .login-sub{font-size:12px;color:var(--text-tertiary);margin-bottom:28px}
.login-card label{display:block;font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;margin-top:16px}
.login-card input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;outline:none;background:var(--bg);color:var(--text);transition:border-color var(--duration-fast) ease,background var(--duration-fast) ease}
.login-card input:focus{border-color:var(--border-focus);background:var(--surface)}
.login-card input:focus-visible{box-shadow:0 0 0 3px rgba(43,43,43,.06)}
.login-card .login-btn{
  width:100%;padding:11px;
  background:var(--accent);color:#fff;
  border:none;border-radius:var(--radius-sm);
  font-size:13px;font-weight:600;cursor:pointer;
  font-family:inherit;margin-top:24px;
  transition:background var(--duration-fast) ease,
             transform var(--duration-fast) var(--ease-out);
}
@media(hover:hover)and(pointer:fine){.login-card .login-btn:hover{background:var(--accent-hover)}}
.login-card .login-btn:active{transform:scale(.98)}
.login-err{color:#c44;font-size:11px;text-align:center;margin-top:12px;min-height:16px;font-weight:500}

/* ━━━ ROLE-BASED ━━━ */
body.role-viewer .admin-only{display:none!important}
body.role-viewer .sb{cursor:default}
body.role-viewer .sb .ba .rm{display:none}
body.role-viewer .sponsor-row .s-del{display:none!important}
body.role-viewer .sponsor-row input[type="checkbox"]{pointer-events:none;opacity:.4}

/* ━━━ USER MANAGEMENT MODAL ━━━ */
.um-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:300;align-items:center;justify-content:center}
.um-overlay.open{display:flex}
.um-modal{
  background:var(--surface);border-radius:var(--radius-lg);
  padding:24px 28px;
  box-shadow:0 16px 48px rgba(0,0,0,.14),0 0 0 1px rgba(0,0,0,.04);
  width:400px;max-height:80vh;overflow-y:auto;
  animation:modalPop var(--duration-slow) var(--ease-out);
}
.um-modal h3{font-size:15px;font-weight:700;margin-bottom:16px}
.um-list{display:flex;flex-direction:column;gap:4px;margin-bottom:18px}
.um-row{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg);border-radius:var(--radius-sm);font-size:12px}
.um-row .um-name{flex:1;font-weight:600}
.um-row .um-role{font-size:10px;padding:2px 8px;border-radius:100px;font-weight:600}
.um-row .um-role.admin{background:#fce8c8;color:#9a6520}
.um-row .um-role.viewer{background:var(--dist);color:var(--dist-t)}
.um-row .um-del{background:none;border:none;color:#c44;cursor:pointer;font-size:14px;opacity:.3;transition:opacity 80ms ease}
@media(hover:hover)and(pointer:fine){.um-row .um-del:hover{opacity:1}}
.um-sep{font-size:10px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px}
.um-form{display:flex;flex-direction:column;gap:6px}
.um-form input,.um-form select{
  padding:9px 12px;border:1px solid var(--border);
  border-radius:var(--radius-sm);
  font-size:12px;font-family:inherit;
  outline:none;background:var(--bg);color:var(--text);
}
.um-form select{cursor:pointer}
.um-form input:focus,.um-form select:focus{border-color:var(--border-focus);background:var(--surface)}

/* ━━━ MOBILE TOGGLE ━━━ */
.mob-toggle{
  display:none;width:100%;
  padding:12px;background:var(--surface);
  border:none;border-bottom:1px solid var(--border);
  font-family:inherit;font-size:12px;
  font-weight:600;color:var(--text-secondary);
  cursor:pointer;text-align:center;
}
@media(hover:hover)and(pointer:fine){.mob-toggle:hover{background:var(--surface-raised)}}
.mob-toggle .arrow{display:inline-block;margin-left:6px;transition:transform var(--duration-normal) var(--ease-out)}
.mob-toggle.open .arrow{transform:rotate(180deg)}

.spread-num{font-size:8px;color:var(--text-tertiary);text-align:center;margin-bottom:2px;font-weight:600}

/* ━━━ REDUCED MOTION ━━━ */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:.01ms!important;
    animation-iteration-count:1!important;
    transition-duration:.01ms!important;
  }
  .toast{transition:opacity var(--duration-fast) ease!important}
}

/* ━━━ RESPONSIVE ━━━ */

/* Tablet — sidebar collapses, pages stack */
@media(max-width:900px){
  .topbar{height:48px;padding:0 14px;gap:8px}
  .topbar-left{min-width:0}
  .topbar-crown{height:16px}
  .logo{font-size:13px}
  .logo-sub{display:none}
  .topbar-right{gap:4px}
  .stat-chips{gap:3px;margin-right:4px}
  .chip{font-size:9px;padding:2px 7px}
  .user-info{font-size:10px;gap:6px;padding-left:8px;margin-left:2px}
  .btn-logout{font-size:9px;padding:3px 6px}

  .app{flex-direction:column;height:auto;min-height:calc(100dvh - 48px)}

  .mob-toggle{display:block}
  .sidebar{width:100%;min-width:0;border-right:none;border-bottom:1px solid var(--border)}
  .sidebar.collapsed .sb-section,
  .sidebar.collapsed .cap-sec,
  .sidebar.collapsed .sponsor-list,
  .sidebar.collapsed .sb-actions{display:none}
  .sponsor-list{max-height:200px}

  .canvas{padding:14px 10px;gap:8px}
  .spread{flex-direction:column;align-items:center;gap:4px}
  .spread-spine{display:none}
  .spread-num{margin-top:4px;margin-bottom:0}
  .page-wrap{
    transform:scale(var(--mob-scale,.75));
    transform-origin:top center;
    margin-bottom:calc(-1*(1 - var(--mob-scale,.75))*(4*var(--ch)+3*var(--g)+2*var(--pp)) - 8px);
  }

  .modal{max-width:92vw;min-width:auto;padding:18px 20px}
  .um-modal{width:92vw;max-width:380px}
  .login-card{width:92vw;max-width:360px;padding:32px 24px}

  .fb-nav-btn{width:36px;height:36px;font-size:22px;margin:0 8px}
  .fb-close-btn{top:10px;right:12px;padding:6px 12px;font-size:18px}

  .sb-actions{flex-wrap:wrap;gap:6px;padding:10px 14px}
  .sb-actions .btn{font-size:10px;padding:7px 8px}
}

/* Small tablet / large phone */
@media(max-width:680px){
  .topbar{height:44px;padding:0 10px}
  .topbar-right .btn span{display:none}
  .topbar-right .btn{padding:6px 8px;min-width:32px}
  .stat-chips{display:none}
  .user-info span{display:none}
  .user-info{border:none;padding:0;margin:0;gap:4px}
  .btn-logout{margin-left:0}

  --mob-scale:.65;
  .page-wrap{
    --mob-scale:.65;
    margin-bottom:calc(-1*(1 - .65)*(4*var(--ch)+3*var(--g)+2*var(--pp)) - 10px);
  }

  .canvas{padding:10px 6px;gap:4px}
  .page-header{font-size:8px}
  .page-tool{font-size:7px;padding:1px 5px}

  .sponsor-list{max-height:180px}
  .sb-section{padding:12px 14px}

  .fb-nav-btn{width:32px;height:32px;font-size:20px;margin:0 6px}
}

/* Phone */
@media(max-width:480px){
  .topbar{height:40px;padding:0 8px;gap:4px}
  .topbar-crown{height:14px}
  .logo{font-size:12px}
  .topbar-right .btn{padding:5px 7px}
  .topbar-right .btn-svg{width:12px;height:12px}
  .user-info svg{width:12px;height:12px}
  .btn-logout{font-size:8px;padding:2px 5px}

  .page-wrap{
    --mob-scale:.5;
    margin-bottom:calc(-1*(1 - .5)*(4*var(--ch)+3*var(--g)+2*var(--pp)) - 12px);
  }

  .canvas{padding:8px 4px;gap:2px}
  .page-header{font-size:7px;margin-bottom:2px}
  .page-tool{font-size:6px;padding:0px 4px}

  .sb-section{padding:10px 12px}
  .sb-title{font-size:10px;margin-bottom:8px}
  .input{font-size:12px;padding:8px 10px}
  .input-wrap .input{padding-left:28px}
  .search-wrap .input{padding-left:28px;font-size:11px}
  .tier-pills{gap:2px}
  .tier-pill{padding:5px 2px;font-size:9px}
  .tier-filters{gap:2px}
  .tier-chip{padding:2px 6px;font-size:8px}
  .filter-tabs{margin-top:8px}
  .filter-tab{font-size:9px;padding:4px 6px}

  .sponsor-list{max-height:160px;padding:4px 8px}
  .sponsor-row{padding:6px 8px;gap:5px}
  .sponsor-row .s-name{font-size:10px}
  .sponsor-row .s-price{font-size:9px}
  .sponsor-row .s-page-badge{font-size:7px;padding:1px 5px}

  .sb-actions{padding:8px 10px;gap:4px}
  .sb-actions .btn{font-size:9px;padding:6px 4px;gap:3px}
  .sb-actions .btn-svg{width:11px;height:11px}

  .modal{max-width:94vw;padding:16px 18px;border-radius:var(--radius-md)}
  .modal h3{font-size:13px}
  .modal-opt{padding:7px 10px;font-size:10px}
  .modal-tier-pill{padding:5px 2px;font-size:9px}
  .modal-tier-pill .pill-label{font-size:7px}
  .modal-tier-pill .pill-size{font-size:6px}
  .modal-cancel{font-size:10px;padding:6px}

  .um-modal{width:94vw;padding:20px;border-radius:var(--radius-md)}
  .um-modal h3{font-size:14px}
  .um-row{padding:7px 10px;font-size:11px}

  .login-card{width:94vw;padding:28px 20px;border-radius:var(--radius-md)}
  .login-card h2{font-size:18px}
  .login-card .login-sub{font-size:11px;margin-bottom:20px}
  .login-crown{height:24px;margin-bottom:10px}

  .fb-nav-btn{width:28px;height:28px;font-size:18px;margin:0 4px}
  .fb-close-btn{top:6px;right:8px;padding:5px 10px;font-size:16px}
  .fb-counter{font-size:10px}
  .fb-footer span{font-size:9px;padding:3px 10px}

  .empty-state{padding:24px 16px;font-size:11px}
}

/* Tiny phone */
@media(max-width:360px){
  .page-wrap{
    --mob-scale:.42;
    margin-bottom:calc(-1*(1 - .42)*(4*var(--ch)+3*var(--g)+2*var(--pp)) - 14px);
  }
  .topbar-left{gap:6px}
  .logo{font-size:11px}
  .topbar-crown{height:12px}
  .login-card{padding:24px 16px}
  .login-crown{height:20px}
  .tier-pill{font-size:8px}
  .sb-actions .btn span{display:none}
}

<body>

<!-- LOGIN -->

<script>
// ─── Config ───
const TIERS={

  140:{l:'Distinction',c:2,r:1,color:'#edf1f8',border:'#b0c2db'},
  250:{l:'Élite',c:2,r:2,color:'#ecf3e9',border:'#a6cfa0'},
  500:{l:'Excellence',c:2,r:3,color:'#f2ecf6',border:'#c5aad2'},
  2000:{l:'Premium',c:3,r:3,color:'#fbf2e3',border:'#d9b55a'}
};
const C=4,R=4;

const M={
  none:()=>Array.from({length:R},()=>Array(C).fill(0)),
  full:()=>Array.from({length:R},()=>Array(C).fill(1)),
  bot1:()=>{const m=M.none();m[3]=[1,1,1,1];return m},
  bot2:()=>{const m=M.none();m[2]=[1,1,1,1];m[3]=[1,1,1,1];return m},
  cor4:()=>{const m=M.none();m[2][2]=1;m[2][3]=1;m[3][2]=1;m[3][3]=1;return m},
};

const PAGES=[
  {n:'Page de garde',m:'none'},
  {n:'Sponsors',m:'full'},
  {n:'Édito du maire',m:'bot1'},
  {n:'Sponsors',m:'full'},

  {n:'Sponsors',m:'full'},

  {n:'Sponsors',m:'full'},

  {n:'Plan de circulation',m:'none'},
  {n:'Sponsors',m:'full'},
  {n:'Sponsors',m:'full'},
  {n:'Ravioles',m:'cor4'},
  {n:'Sponsors',m:'full'},

  {n:'Sponsors',m:'full'},
  {n:'Groupe musique 2',m:'bot2'},
  {n:'Sponsors',m:'full'},
  {n:'Groupe musique 3',m:'bot2'},
  {n:'Sponsors',m:'full'},
  {n:'Groupe musique 4',m:'bot2'},
  {n:'Nos locaux',m:'none'},
];

// ─── Supabase ───
const SB_URL='https://atoawzkzkjdwsnwwfhnq.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0b2F3emt6a2pkd3Nud3dmaG5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NTIyOTAsImV4cCI6MjA5NjIyODI5MH0.cJMttPZqbBA5qsHYZT4mYHor29x-_3QNsM4LiDK2cLw';

let grids, sponsors=[], selTierV=70, curFilter='all', nextId=1, dragId=null;

let curUser=null;
let searchQuery='', tierFilterSet=new Set();

function initGrids(){
  grids=PAGES.map(p=>({mask:M[p.m](),grid:Array.from({length:R},()=>Array(C).fill(null))}));
}

function hasSponsorSlots(pi){return PAGES[pi].m!=='none'}
function availCells(pi){return grids[pi].mask.flat().filter(v=>v===1).length}

// ─── Core ───
function selTier(t){selTierV=t;document.querySelectorAll('.tier-pill').forEach(b=>b.classList.toggle('active',+b.dataset.tier===t))}
function setFilter(f){curFilter=f;document.querySelectorAll('.filter-tab').forEach(b=>b.classList.toggle('active',b.dataset.filter===f));renderList()}
function toggleTierFilter(t){
  if(tierFilterSet.has(t))tierFilterSet.delete(t);else tierFilterSet.add(t);
  document.querySelectorAll('.tier-chip').forEach(b=>b.classList.toggle('active',tierFilterSet.has(+b.dataset.tier)));
  renderList();
}
function clearSearch(){
  searchQuery='';document.getElementById('searchInput').value='';
  document.getElementById('searchClear').classList.remove('visible');
  renderList();
}

function addSponsor(){
  const inp=document.getElementById('sponsorName'),name=inp.value.trim();
  if(!name){inp.focus();return}
  if(sponsors.find(s=>s.name.toLowerCase()===name.toLowerCase()))
    if(!confirm(`"${name}" existe déjà. Ajouter quand même ?`))return;
  sponsors.push({id:nextId++,name,tier:selTierV,page:-1,pin:-1,col:-1,row:-1,img:null,imgName:null});
  inp.value='';inp.focus();
  repack();renderAll();save();
}
document.getElementById('sponsorName').addEventListener('keydown',e=>{if(e.key==='Enter')addSponsor()});
document.getElementById('searchInput').addEventListener('input',e=>{
  searchQuery=e.target.value.trim();
  document.getElementById('searchClear').classList.toggle('visible',searchQuery.length>0);
  renderList();
});

function deleteSponsor(id){
  const s=sponsors.find(x=>x.id===id);if(!s)return;
  removeFromGrid(s);sponsors=sponsors.filter(x=>x.id!==id);
  repack();renderAll();save();
}

function removeFromGrid(s){
  if(s.page<0)return;
  const t=TIERS[s.tier],g=grids[s.page].grid;
  for(let dr=0;dr<t.r;dr++)for(let dc=0;dc<t.c;dc++)
    if(g[s.row+dr]?.[s.col+dc]===s.id)g[s.row+dr][s.col+dc]=null;
  s.page=-1;s.col=-1;s.row=-1;
}

function findSpace(pi,cols,rows){
  const g=grids[pi].grid,mk=grids[pi].mask;
  for(let r=0;r<=R-rows;r++)for(let c=0;c<=C-cols;c++){
    let ok=true;
    for(let dr=0;dr<rows&&ok;dr++)for(let dc=0;dc<cols&&ok;dc++)
      if(mk[r+dr][c+dc]!==1||g[r+dr][c+dc]!==null)ok=false;
    if(ok)return{col:c,row:r};
  }
  return null;
}

function place(s,pi,col,row){
  const t=TIERS[s.tier];s.page=pi;s.col=col;s.row=row;
  for(let dr=0;dr<t.r;dr++)for(let dc=0;dc<t.c;dc++)
    grids[pi].grid[row+dr][col+dc]=s.id;
}

function repack(){
  grids.forEach(g=>g.grid=Array.from({length:R},()=>Array(C).fill(null)));
  sponsors.forEach(s=>{s.page=-1;s.col=-1;s.row=-1});
  const sz=t=>TIERS[t].c*TIERS[t].r;
  const pinned=sponsors.filter(s=>s.pin>=0).sort((a,b)=>sz(b.tier)-sz(a.tier));
  pinned.forEach(s=>{
    const pos=findSpace(s.pin,TIERS[s.tier].c,TIERS[s.tier].r);
    if(pos)place(s,s.pin,pos.col,pos.row);
    else{s.pin=-1;}
  });
  const unpinned=sponsors.filter(s=>s.page<0).sort((a,b)=>sz(b.tier)-sz(a.tier)||a.name.localeCompare(b.name));
  const pageOrder=[...Array(28).keys()].filter(i=>hasSponsorSlots(i)).sort((a,b)=>availCells(b)-availCells(a));
  unpinned.forEach(s=>{
    const t=TIERS[s.tier];
    for(const pi of pageOrder){
      const pos=findSpace(pi,t.c,t.r);
      if(pos){place(s,pi,pos.col,pos.row);return;}
    }
  });
}

function isPlaced(s){return s.page>=0}

// ─── Move / Pin ───

  const t=TIERS[s.tier],modal=document.getElementById('movM');
  let h='';
  const fullPages=[], partialPages=[];
  PAGES.forEach((p,i)=>{

    if(p.m==='full')fullPages.push(i);else partialPages.push(i);
  });
  h+=`<h3>${esc(s.name)}</h3>`;
  h+=`<div class="modal-sub">${t.l} &middot; ${s.tier} &euro; &middot; ${t.c}&times;${t.r} encarts`;
  if(s.pin>=0)h+=` &middot; <strong style="color:#e89040">&#x1F4CC; P${s.pin+1}</strong>`;
  h+=`</div>`;

  // Tier switcher
  h+=`<div class="modal-tier-wrap"><div class="modal-sep">Formule</div><div class="modal-tier-pills">`;

      ${tv>=2000?'2000+':tv+'&nbsp;&euro;'}

      <span class="pill-size">${ti.c}&times;${ti.r}</span>
    </button>`;
  });
  h+=`</div></div>`;

  // Image section
  h+=`<div class="modal-img-section"><div class="modal-sep">Visuel</div>`;
  if(s.img){
    h+=`<div class="modal-img-preview"><img src="${s.img}" alt="Visuel"><button class="img-remove" onclick="removeSponsorImg(${sid})" title="Supprimer">&times;</button></div>`;
    h+=`<div style="margin-top:4px;font-size:10px;color:var(--text-tertiary)">${esc(s.imgName||'image')}</div>`;
  } else {
    h+=`<button class="modal-img-attach" onclick="triggerSponsorImg(${sid})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Joindre un visuel</button>`;
  }
  h+=`</div>`;

  // Pin pages
  h+=`<div class="modal-options">`;
  h+=`<div class="modal-sep">Épingler à une page</div>`;
  fullPages.forEach(i=>{
    const cur=s.page===i,pin=s.pin===i;
    h+=`<button class="modal-opt ${cur?'cur':''}" onclick="pinTo(${sid},${i})">P${i+1} ${pin?'&#x1F4CC;':''} <span class="m-pg">${PAGES[i].n}</span></button>`;
  });
  h+=`<div class="modal-sep">Pages avec contenu</div>`;
  partialPages.forEach(i=>{
    const cur=s.page===i,pin=s.pin===i;
    const cells=availCells(i);
    const fits=t.c*t.r<=cells;
    h+=`<button class="modal-opt ${cur?'cur':''}" ${!fits?'disabled':''} onclick="pinTo(${sid},${i})">P${i+1} ${pin?'&#x1F4CC;':''} <span class="m-pg">${PAGES[i].n} &middot; ${cells} encarts</span></button>`;
  });
  if(s.pin>=0)
    h+=`<div class="modal-sep"></div><button class="modal-opt unpin-btn" onclick="unpin(${sid})"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;margin-right:4px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Désépingler — placement automatique</button>`;
  h+=`</div><button class="modal-cancel" onclick="closeModal()">Fermer</button>`;
  modal.innerHTML=h;

function closeModal(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('movOv').classList.remove('open')}
function pinTo(sid,pi){const s=sponsors.find(x=>x.id===sid);if(!s)return;s.pin=pi;repack();closeModal();renderAll();save()}
function unpin(sid){const s=sponsors.find(x=>x.id===sid);if(!s)return;s.pin=-1;repack();closeModal();renderAll();save()}

  s.img=null;s.imgName=null;
  openModal(sid);
  renderAll();save();
  toast('Visuel retiré');
}

function compressImage(file,maxDim,quality,cb){
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxDim||h>maxDim){
        if(w>h){h=Math.round(h*(maxDim/w));w=maxDim}
        else{w=Math.round(w*(maxDim/h));h=maxDim}
      }
      const c=document.createElement('canvas');c.width=w;c.height=h;
      const ctx=c.getContext('2d');ctx.drawImage(img,0,0,w,h);
      // Keep PNG if has transparency, otherwise JPEG
      const isPng=file.type==='image/png';
      const mime=isPng?'image/png':'image/jpeg';
      const q=isPng?undefined:quality;
      cb(c.toDataURL(mime,q));
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function slugify(str){
  return str.normalize('NFD').replace(/[̀-ͯ]/g,'')
    .toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
}

function changeTier(sid,newTier){
  const s=sponsors.find(x=>x.id===sid);if(!s||s.tier===newTier)return;
  const oldTier=s.tier;
  removeFromGrid(s);
  s.tier=newTier;
  s.pin=-1; // reset pin since size changed
  repack();
  // Re-open modal to reflect the change
  openModal(sid);
  renderAll();save();
  toast(`${s.name} : ${oldTier} € → ${newTier} €`);
}

// ─── Rendering ───
function renderAll(){renderList();renderPages();renderStats();renderCap()}

function renderStats(){
  const tot=sponsors.length,pl=sponsors.filter(isPlaced).length,rev=sponsors.reduce((s,x)=>s+x.tier,0);
  document.getElementById('stats').innerHTML=
    `<span class="chip"><strong>${tot}</strong>&nbsp;sponsors</span><span class="chip"><strong>${pl}</strong>&nbsp;placés</span><span class="chip"><strong>${rev}&nbsp;&euro;</strong></span>`;
  document.getElementById('cntBadge').textContent=tot;
}

function renderCap(){
  const el=document.getElementById('capSec');
  let totalCells=0;
  PAGES.forEach((p,i)=>{if(p.m!=='none')totalCells+=grids[i].mask.flat().filter(v=>v===1).length});
  let used=0;const counts={};
  const tks=Object.keys(TIERS).map(Number).sort((a,b)=>b-a);
  tks.forEach(t=>{counts[t]=0});
  sponsors.forEach(s=>{counts[s.tier]=(counts[s.tier]||0)+1;if(isPlaced(s))used+=TIERS[s.tier].c*TIERS[s.tier].r});
  const rem=totalCells-used,pct=Math.round(used/totalCells*100);
  const col=pct>90?'#c44':pct>70?'#e89040':'#50b860';
  let rows='';
  tks.forEach(t=>{
    const ti=TIERS[t],lb=t>=2000?'2000+':t+'&euro;';
    rows+=`<span class="cap-label" style="color:${ti.border}">${lb}</span><span class="cap-count">${counts[t]}</span><span class="cap-avail">~${Math.floor(rem/(ti.c*ti.r))} dispo</span>`;
  });
  el.innerHTML=`<div class="sb-title">Capacité</div><div class="cap-grid">${rows}</div>
    <div class="cap-bar"><div class="cap-bar-fill" style="width:${pct}%;background:${col}"></div></div>
    <div class="cap-summary">${used}/${totalCells} encarts &middot; ${pct}%</div>`;
}

function renderList(){
  const list=document.getElementById('sList');
  let f=[...sponsors];
  if(curFilter==='placed')f=f.filter(isPlaced);
  if(curFilter==='unplaced')f=f.filter(s=>!isPlaced(s));
  if(tierFilterSet.size>0)f=f.filter(s=>tierFilterSet.has(s.tier));
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    f=f.filter(s=>s.name.toLowerCase().includes(q));
  }
  const totalMatch=f.length;
  if(!f.length){
    const hasFilters=curFilter!=='all'||searchQuery||tierFilterSet.size>0;
    list.innerHTML='<div class="empty-state">'+(hasFilters?'Aucun résultat pour ces filtres.':'Aucun sponsor.')+'</div>';
    return;
  }
  f.sort((a,b)=>b.tier-a.tier||a.name.localeCompare(b.name));
  list.innerHTML=f.map(s=>{
    const pl=isPlaced(s);
    let badge='';
    if(pl){
      const pinned=s.pin>=0;
      badge=`<span class="s-page-badge ${pinned?'pinned':''}">${pinned?'&#x1F4CC; ':''}P${s.page+1}</span>`;
    }
    const adm=isAdmin();
    const hasVis=!!s.img;
    const imgBdg=hasVis
      ?`<span class="s-img-badge has-img" title="Visuel joint"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>`
      :`<span class="s-img-badge no-img" title="Aucun visuel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></span>`;
    return `<div class="sponsor-row ${pl?'placed':''}" data-tier="${s.tier}" data-id="${s.id}" ${adm?'draggable="true" ondragstart="dragS(event,'+s.id+')"':''}>
      <input type="checkbox" ${pl?'checked':''} ${adm?'onchange="togPlace('+s.id+',this.checked)"':'disabled'}>
      <span class="s-name" onclick="openModal(${s.id})" title="Gérer le sponsor">${esc(s.name)}</span>
      ${imgBdg}
      <span class="s-price">${s.tier} €</span>${badge}
      ${adm?`<button class="s-del" onclick="deleteSponsor(${s.id})">&times;</button>`:''}</div>`;
  }).join('');
}

function togPlace(id,checked){
  const s=sponsors.find(x=>x.id===id);if(!s)return;
  if(!checked){removeFromGrid(s);s.pin=-1;}
  repack();renderAll();save();
}

function renderPages(){
  const main=document.getElementById('main');
  let html='';
  const spreads=[[0]];
  for(let i=1;i<27;i+=2)spreads.push([i,i+1]);
  spreads.push([27]);
  spreads.forEach(sp=>{
    html+='<div class="spread">';
    sp.forEach((pi,idx)=>{
      if(idx>0)html+='<div class="spread-spine"></div>';
      html+=renderPageWrap(pi);
    });
    html+='</div>';
  });
  main.innerHTML=html;
}

function renderPageWrap(pi){
  const p=PAGES[pi],g=grids[pi],noSp=p.m==='none',adm=isAdmin();
  const rendered=new Set();
  let cells='';
  const cw=108,ch=72,gap=3,pad=31;
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){
    const sid=g.grid[r][c],avail=g.mask[r][c]===1;
    if(sid&&!rendered.has(sid)&&avail){
      rendered.add(sid);
      const s=sponsors.find(x=>x.id===sid);
      if(s){
        const t=TIERS[s.tier];
        const w=t.c*(cw+gap)-gap,h=t.r*(ch+gap)-gap;
        const l=pad+c*(cw+gap),tp=pad+r*(ch+gap);
        cells+=`<div class="sb" data-tier="${s.tier}" data-id="${s.id}"
          style="left:${l}px;top:${tp}px;width:${w}px;height:${h}px"
          ${adm?`draggable="true" ondragstart="dragB(event,${s.id})"`:''}>
          <div class="ba"><button onclick="openModal(${s.id})" title="Épingler">&#8596;</button>${adm?`<button class="rm" onclick="removeBlock(${s.id})">&times;</button>`:''}</div>
          <span class="bn">${esc(s.name)}</span>
          <span class="bp">${s.tier}&euro;${s.pin>=0?' &#x1F4CC;':''}</span>${s.img?'<span class="img-dot" title="Visuel joint"></span>':''}</div>`;
      }
    }
    const occ=sid!==null;
    let cls='cell';
    if(!avail&&!noSp)cls+=' blocked';
    else if(occ)cls+=' occupied';
    const canDrop=adm&&avail&&!occ&&!noSp;
    cells+=`<div class="${cls}" data-pi="${pi}" data-col="${c}" data-row="${r}"
      ${canDrop?`ondragover="dOver(event)" ondrop="dDrop(event,${pi},${c},${r})" ondragenter="dEnt(event)" ondragleave="dLeav(event)"`:''}
      style="grid-column:${c+1};grid-row:${r+1}"></div>`;
  }
  const hasCells=!noSp&&g.grid.flat().some(v=>v!==null);
  const hasImg=!!pageImages[pi];
  const bgImg=hasImg?`<img class="pg-bg" src="${pageImages[pi]}">`:'';
  const imgBtns=adm?`<button class="page-tool" onclick="setPageImg(${pi})" title="Image">${hasImg?'&#x1F5BC;':'&#x1F4F7;'}</button>${hasImg?`<button class="page-tool page-tool-danger" onclick="clearPageImg(${pi})" title="Supprimer">&times;</button>`:''}` :'';
  return `<div class="page-wrap">
    <div class="page-header"><strong>P${pi+1}</strong> &mdash; ${esc(p.n)}${!noSp&&p.m!=='full'?' ('+availCells(pi)+' encarts)':''}${hasCells?` <button class="page-tool" onclick="copySVG(${pi})" title="Copier SVG">SVG</button>`:''} ${imgBtns}</div>
    <div class="pg-grid ${noSp?'no-sponsors':''} ${hasImg?'has-bg':''}" data-pi="${pi}">${bgImg}${cells}</div>
  </div>`;
}

function removeBlock(id){const s=sponsors.find(x=>x.id===id);if(s){removeFromGrid(s);s.pin=-1;repack();renderAll();save()}}

// ─── Drag & Drop ───
function dragS(e,id){dragId=id;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',id)}
function dragB(e,id){dragId=id;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',id);e.stopPropagation()}
function dOver(e){e.preventDefault();e.dataTransfer.dropEffect='move'}
function dEnt(e){if(e.target.classList.contains('cell')&&!e.target.classList.contains('occupied'))e.target.classList.add('drop-hl')}
function dLeav(e){if(e.target.classList.contains('cell'))e.target.classList.remove('drop-hl')}

function dDrop(e,pi,col,row){
  e.preventDefault();document.querySelectorAll('.drop-hl').forEach(el=>el.classList.remove('drop-hl'));
  if(dragId===null)return;
  const s=sponsors.find(x=>x.id===dragId);if(!s)return;
  const t=TIERS[s.tier],mk=grids[pi].mask,g=grids[pi].grid;
  if(col+t.c>C||row+t.r>R){toast('Pas assez de place');return}
  for(let dr=0;dr<t.r;dr++)for(let dc=0;dc<t.c;dc++){
    if(mk[row+dr]?.[col+dc]!==1){toast('Zone réservée');return}
    const v=g[row+dr][col+dc];if(v!==null&&v!==s.id){toast('Occupé');return}
  }
  removeFromGrid(s);
  s.pin=pi;
  place(s,pi,col,row);
  dragId=null;renderAll();save();
}

// ─── SVG ───
const PW=210,PH=148,PM=13,SW=PW-2*PM,SH=PH-2*PM,SG=1.5,SCW=(SW-(C-1)*SG)/C,SCH=(SH-(R-1)*SG)/R;
function svgWrap(t,max){if(t.length<=max)return[t];const w=t.split(/\s+/),l=[];let ln='';for(const x of w){const test=ln?ln+' '+x:x;if(test.length>max&&ln){l.push(ln);ln=x}else ln=test}if(ln)l.push(ln);return l}
function svgBlk(x,y,w,h,t,s){let o=`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="2.5" fill="${t.color}" stroke="${t.border}" stroke-width="0.4"/>`;const fs=3.2,cw2=fs*.55,max=Math.floor((w-2)/cw2),lines=svgWrap(s.name,max),lh=fs*1.3,ps=2.5,th=lines.length*lh+ps+1.5,sy=y+(h-th)/2+fs,cx=x+w/2;lines.forEach((l,i)=>{o+=`<text x="${cx}" y="${sy+i*lh}" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="${fs}" fill="#1a1a1a">${escX(l)}</text>`});o+=`<text x="${cx}" y="${sy+lines.length*lh+1.5}" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="${ps}" fill="#666">${s.tier} &euro;</text>`;return o}
function svgPage(pi){
  const g=grids[pi],mk=g.mask,rd=new Set();let r='';
  for(let row=0;row<R;row++)for(let col=0;col<C;col++){
    const x=col*(SCW+SG),y=row*(SCH+SG),av=mk[row][col]===1,sid=g.grid[row][col];
    if(sid&&!rd.has(sid)&&av){rd.add(sid);const s=sponsors.find(sp=>sp.id===sid);if(s){const t=TIERS[s.tier];r+=svgBlk(x,y,t.c*(SCW+SG)-SG,t.r*(SCH+SG)-SG,t,s)}}
    else if(av&&!sid)r+=`<rect x="${x}" y="${y}" width="${SCW}" height="${SCH}" rx="1.5" fill="none" stroke="#ddd" stroke-width=".25" stroke-dasharray="2,1"/>`;
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="-0.5 -0.5 ${SW+1} ${SH+1}" width="${SW}mm" height="${SH}mm">${r}</svg>`;
}

function copySVG(pi){navigator.clipboard.writeText(svgPage(pi)).then(()=>toast('SVG copié')).catch(()=>toast('Erreur'))}

function exportPDF(){
  let body='';
  for(let pi=0;pi<28;pi++){
    const p=PAGES[pi],hasImg=!!pageImages[pi],hasSlots=hasSponsorSlots(pi);
    let content='';
    if(hasImg) content+=`<img class="bg" src="${pageImages[pi]}">`;
    if(hasSlots){
      const svg=svgPage(pi).replace(/width="[^"]*"/,'width="100%"').replace(/height="[^"]*"/,'height="100%"');
      content+=`<div class="sv">${svg}</div>`;
    }
    if(!hasImg&&!hasSlots) content+=`<div class="em">${esc(p.n)}</div>`;
    body+=`<div class="p">${content}</div>`;
  }
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>Programme Rosière 2026</title><style>

body{background:#eee;font-family:sans-serif}

// ─── Copy list ───
function copyList(){
  const lines=[];[70,140,250,500,2000].forEach(t=>{lines.push((t>=2000?'2000€ et +':t+'€')+' :\n');const g=sponsors.filter(s=>s.tier===t).sort((a,b)=>a.name.localeCompare(b.name));g.length?g.forEach(s=>lines.push('* '+s.name)):lines.push('(aucun)');lines.push('')});
  navigator.clipboard.writeText(lines.join('\n').trim()).then(()=>toast('Liste copiée')).catch(()=>toast('Erreur'));
}

// ─── Import / Export ───
async function exportJSON(){
  const hasAnyImg=sponsors.some(s=>!!s.img);

  if(hasAnyImg && typeof JSZip!=='undefined'){
    // Export as ZIP with img/ folder
    const zip=new JSZip();
    const imgFolder=zip.folder('img');

    // Build sponsors data without base64 for the JSON (lighter file)
    const sponsorsClean=sponsors.map(s=>{
      const copy={...s};
      if(copy.img){
        const ext=copy.img.startsWith('data:image/png')?'.png':'.jpg';
        copy.imgFile=slugify(copy.name)+ext;
        // Add image to ZIP
        const b64data=copy.img.split(',')[1];
        imgFolder.file(copy.imgFile,b64data,{base64:true});
        delete copy.img; // remove heavy base64 from JSON
      } else {
        delete copy.img;
        copy.imgFile=null;
      }
      delete copy.imgName;
      return copy;
    });

    const data={sponsors:sponsorsClean,grids:grids.map(g=>g.grid),nextId,pageImages};
    zip.file('sponsors-rosiere.json',JSON.stringify(data,null,2));

    const blob=await zip.generateAsync({type:'blob'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='sponsors-rosiere-'+new Date().toISOString().slice(0,10)+'.zip';
    a.click();URL.revokeObjectURL(a.href);
    toast('Export ZIP avec '+sponsors.filter(s=>!!s.img).length+' visuels');
  } else {
    // Fallback: plain JSON (no images or JSZip unavailable)
    const data={sponsors:sponsors.map(s=>({...s})),grids:grids.map(g=>g.grid),nextId,pageImages};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='sponsors-rosiere-'+new Date().toISOString().slice(0,10)+'.json';
    a.click();URL.revokeObjectURL(a.href);toast('Sauvegarde exportée');
  }
}

async function importJSON(e){
  const file=e.target.files[0];if(!file)return;

  if(file.name.endsWith('.zip') && typeof JSZip!=='undefined'){
    // ZIP import — restore images from img/ folder
    try{
      const zip=await JSZip.loadAsync(file);
      const jsonFile=zip.file('sponsors-rosiere.json');
      if(!jsonFile)throw 'JSON manquant dans le ZIP';
      const jsonStr=await jsonFile.async('string');
      const d=JSON.parse(jsonStr);if(!d.sponsors)throw 0;
      sponsors=d.sponsors;
      // Restore images from zip
      let imgCount=0;
      for(const s of sponsors){
        s.pin=s.pin??-1;
        s.page=s.page??s.pageIndex??-1;
        delete s.specialPageIndex;delete s.pageIndex;
        if(s.imgFile){
          const imgEntry=zip.file('img/'+s.imgFile);
          if(imgEntry){
            const b64=await imgEntry.async('base64');
            const ext=s.imgFile.endsWith('.png')?'image/png':'image/jpeg';
            s.img='data:'+ext+';base64,'+b64;
            s.imgName=s.imgFile;
            imgCount++;
          } else {s.img=null;s.imgName=null}
          delete s.imgFile;
        } else {s.img=s.img||null;s.imgName=s.imgName||null}
      }
      nextId=d.nextId||1;
      if(d.grids)d.grids.forEach((g,i)=>{if(grids[i])grids[i].grid=g});
      else repack();
      if(d.pageImages&&Array.isArray(d.pageImages)){pageImages=d.pageImages;saveImages()}
      save();renderAll();toast(sponsors.length+' sponsors importés ('+imgCount+' visuels)');
    }catch(err){toast('ZIP invalide : '+(err.message||err))}
  } else {
    // Plain JSON import
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const d=JSON.parse(ev.target.result);if(!d.sponsors)throw 0;
        sponsors=d.sponsors;
        sponsors.forEach(s=>{
          s.pin=s.pin??-1;s.page=s.page??s.pageIndex??-1;
          delete s.specialPageIndex;delete s.pageIndex;
          s.img=s.img||null;s.imgName=s.imgName||null;
        });
        nextId=d.nextId||1;
        if(d.grids)d.grids.forEach((g,i)=>{if(grids[i])grids[i].grid=g});
        else repack();
        if(d.pageImages&&Array.isArray(d.pageImages)){pageImages=d.pageImages;saveImages()}
        save();renderAll();toast(sponsors.length+' sponsors importés');
      }catch(err){toast('Fichier invalide')}
    };reader.readAsText(file);
  }
  e.target.value='';
}

let saving=false,pendingSave=false;

async function sbSave(){
  if(saving){pendingSave=true;return}
  saving=true;
  try{
    await fetch(SB_URL+'/rest/v1/app_state?id=eq.main',{
      method:'PATCH',headers:SB_HEADERS,
      body:JSON.stringify({sponsors:sponsors,grids:grids.map(g=>g.grid),next_id:nextId,updated_at:new Date().toISOString()})
    });
  }catch(e){console.warn('Supabase save failed',e)}
  saving=false;
  if(pendingSave){pendingSave=false;sbSave()}
}

async function sbLoad(){
  try{
    const res=await fetch(SB_URL+'/rest/v1/app_state?id=eq.main&select=*',{headers:SB_READ});
    const rows=await res.json();
    if(rows.length&&rows[0].sponsors&&rows[0].sponsors.length>0){
      applyData(rows[0].sponsors,rows[0].grids,rows[0].next_id);
      toast('Données chargées');
      return true;
    }
  }catch(e){console.warn('Supabase load failed',e)}
  return false;
}

function applyData(sp,gr,nid){
  sponsors=sp||[];nextId=nid||1;
  sponsors.forEach(s=>{
    if(s.pin===undefined)s.pin=-1;
    if(s.page===undefined)s.page=-1;
    if(s.img===undefined)s.img=null;
    if(s.imgName===undefined)s.imgName=null;
  });
  if(gr)gr.forEach((g,i)=>{if(grids[i])grids[i].grid=g});
}

function save(){
  localStorage.setItem('rosiere-2026',JSON.stringify({sponsors,grids:grids.map(g=>g.grid),nextId}));
  sbSave();
}

function loadLocal(){
  const raw=localStorage.getItem('rosiere-2026');if(!raw)return false;
  try{
    const d=JSON.parse(raw);
    if(!d.sponsors||!d.sponsors.length)return false;
    applyData(d.sponsors,d.grids,d.nextId);
    return true;
  }catch(e){return false}
}

// ─── Page Images (Supabase Storage) ───
function setPageImg(pi){imgTarget=pi;document.getElementById('imgF').click()}

function handleImgUpload(e){
  const file=e.target.files[0];if(!file||imgTarget<0)return;
  const pi=imgTarget;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const maxW=1200,scale=Math.min(1,maxW/img.width);
      const cv=document.createElement('canvas');cv.width=img.width*scale;cv.height=img.height*scale;
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      cv.toBlob(async blob=>{
        toast('Upload...');
        const url=await storageUpload(pi,blob);
        if(url){pageImages[pi]=url;saveImageUrls();renderAll();toast('Image ajoutée — P'+(pi+1))}
        else toast('Erreur upload');
      },'image/jpeg',.8);
    };img.src=ev.target.result;
  };reader.readAsDataURL(file);e.target.value='';
}

async function storageUpload(pi,blob){
  const path='page-'+pi+'.jpg';
  try{
    const res=await fetch(SB_URL+'/storage/v1/object/page-images/'+path,{
      method:'POST',headers:{'Authorization':'Bearer '+SB_KEY,'apikey':SB_KEY,'Content-Type':'image/jpeg','x-upsert':'true'},
      body:blob
    });
    if(res.ok) return SB_URL+'/storage/v1/object/public/page-images/'+path+'?v='+Date.now();
  }catch(e){console.warn('Storage upload failed',e)}
  return null;
}

async function clearPageImg(pi){
  try{await fetch(SB_URL+'/storage/v1/object/page-images/page-'+pi+'.jpg',{
    method:'DELETE',headers:{'Authorization':'Bearer '+SB_KEY,'apikey':SB_KEY}
  })}catch(e){}
  pageImages[pi]=null;saveImageUrls();renderAll();toast('Image retirée — P'+(pi+1));
}

async function saveImageUrls(){
  try{await fetch(SB_URL+'/rest/v1/app_state?id=eq.main',{
    method:'PATCH',headers:SB_HEADERS,
    body:JSON.stringify({page_images:pageImages,updated_at:new Date().toISOString()})
  })}catch(e){console.warn('Failed to save image URLs',e)}
  localStorage.setItem('rosiere-2026-images',JSON.stringify(pageImages));
}

async function loadImages(){
  try{
    const res=await fetch(SB_URL+'/rest/v1/app_state?id=eq.main&select=page_images',{headers:SB_READ});
    const rows=await res.json();
    if(rows.length&&rows[0].page_images&&Array.isArray(rows[0].page_images)){
      pageImages=rows[0].page_images;
      localStorage.setItem('rosiere-2026-images',JSON.stringify(pageImages));
      return;
    }
  }catch(e){}
  const r=localStorage.getItem('rosiere-2026-images');
  if(r)try{const d=JSON.parse(r);if(Array.isArray(d))pageImages=d}catch(e){}
}

// ─── Flipbook ───
let fbAnimating=false;
function fbSpreads(){const s=[[0]];for(let i=1;i<27;i+=2)s.push([i,i+1]);s.push([27]);return s}

let fbTouchStartX=0,fbTouchStartY=0,fbSwiping=false;
function fbTouchStart(e){
  if(e.touches.length!==1)return;
  fbTouchStartX=e.touches[0].clientX;
  fbTouchStartY=e.touches[0].clientY;
  fbSwiping=true;
}
function fbTouchEnd(e){
  if(!fbSwiping)return;
  fbSwiping=false;
  const dx=e.changedTouches[0].clientX-fbTouchStartX;
  const dy=e.changedTouches[0].clientY-fbTouchStartY;
  if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.5){
    fbNav(dx<0?1:-1);
  }
}

function openFB(){
  fbIdx=0;
  const ov=document.getElementById('fbOv');
  ov.classList.add('open');
  renderFB();
  document.addEventListener('keydown',fbKey);
  ov.addEventListener('touchstart',fbTouchStart,{passive:true});
  ov.addEventListener('touchend',fbTouchEnd,{passive:true});
  document.getElementById('fbCloseBtn').addEventListener('click',closeFB);
}
function closeFB(e){
  if(e)e.stopPropagation();
  const ov=document.getElementById('fbOv');
  ov.classList.remove('open');
  document.removeEventListener('keydown',fbKey);
  ov.removeEventListener('touchstart',fbTouchStart);
  ov.removeEventListener('touchend',fbTouchEnd);
}
function fbOverlayClick(e){if(e.target===document.getElementById('fbOv'))closeFB()}
function fbKey(e){
  if(e.key==='Escape')closeFB();
  if(e.key==='ArrowLeft'){e.preventDefault();fbNav(-1)}
  if(e.key==='ArrowRight'){e.preventDefault();fbNav(1)}
}

function fbNav(d){
  if(fbAnimating)return;
  const sp=fbSpreads();
  const newIdx=Math.max(0,Math.min(sp.length-1,fbIdx+d));
  if(newIdx===fbIdx)return;
  fbAnimating=true;
  const cont=document.getElementById('fbPages');
  const dir=d>0?-1:1;
  cont.style.transition='transform .22s ease-in, opacity .22s ease-in';
  cont.style.transform=`translateX(${dir*40}px)`;
  cont.style.opacity='0';
  setTimeout(()=>{
    fbIdx=newIdx;
    renderFB();
    cont.style.transition='none';
    cont.style.transform=`translateX(${-dir*40}px)`;
    cont.style.opacity='0';
    cont.offsetHeight;
    cont.style.transition='transform .28s cubic-bezier(.23,1,.32,1), opacity .28s ease-out';
    cont.style.transform='translateX(0)';
    cont.style.opacity='1';
    setTimeout(()=>{fbAnimating=false},300);
  },230);
}

function renderFB(){
  const sp=fbSpreads(),pages=sp[fbIdx],cont=document.getElementById('fbPages');
  const vw=window.innerWidth,vh=window.innerHeight;
  const mob=vw<=900,tiny=vw<=480;
  /* Each page width — two pages must fit side by side with nav buttons */
  const navSpace=mob?80:120;
  const maxW=Math.min((vw-navSpace)/2, mob?320:660);
  const ph=maxW*(PH/PW);
  const mLeft=(PM/PW*100).toFixed(2);
  const mTop=(PM/PH*100).toFixed(2);
  const contentW=(SW/PW*100).toFixed(2);
  const contentH=(SH/PH*100).toFixed(2);
  let html='';
  pages.forEach((pi,idx)=>{
    const p=PAGES[pi],hasImg=!!pageImages[pi];
    const hasSlots=hasSponsorSlots(pi);
    const cls=pages.length===1?'':(idx===0?'left':'');
    html+=`<div class="fb-page ${cls}" style="width:${maxW}px;height:${ph}px">`;
    if(hasImg) html+=`<img class="fb-bg" src="${pageImages[pi]}">`;
    if(hasSlots){
      const svg=svgPage(pi).replace(/width="[^"]*"/,'width="100%"').replace(/height="[^"]*"/,'height="100%"');
      html+=`<div class="fb-svg" style="left:${mLeft}%;top:${mTop}%;width:${contentW}%;height:${contentH}%">${svg}</div>`;
    } else if(!hasImg){
      html+=`<div class="fb-empty">${esc(p.n)}</div>`;
    }
    html+=`</div>`;
  });
  cont.innerHTML=html;
  const names=pages.map(pi=>`P${pi+1} — ${PAGES[pi].n}`);
  document.getElementById('fbTitle').textContent=names.join('  ·  ');
  document.getElementById('fbInfo').textContent=`${fbIdx+1} / ${sp.length}`;
  document.getElementById('fbPrev').disabled=fbIdx===0;
  document.getElementById('fbNext').disabled=fbIdx===sp.length-1;
}

// ─── Auth ───
function isAdmin(){return curUser&&curUser.role==='admin'}

async function hashPwd(p){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPwd').value;
  if(!u||!p){document.getElementById('loginErr').textContent='Remplissez les deux champs';return}
  const h=await hashPwd(p);
  try{
    const res=await fetch(SB_URL+'/rest/v1/users?username=eq.'+encodeURIComponent(u)+'&password_hash=eq.'+h+'&select=*',{headers:SB_READ});
    const rows=await res.json();
    if(!rows.length){document.getElementById('loginErr').textContent='Identifiants incorrects';return}
    curUser=rows[0];
    sessionStorage.setItem('rosiere-session',JSON.stringify(curUser));
    document.getElementById('loginOv').style.display='none';
    applyRole();
    initApp();
  }catch(e){document.getElementById('loginErr').textContent='Erreur de connexion au serveur'}
}

function logout(){
  curUser=null;
  sessionStorage.removeItem('rosiere-session');
  document.getElementById('loginOv').style.display='';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPwd').value='';
  document.getElementById('loginErr').textContent='';
}

function applyRole(){
  const adm=isAdmin();
  document.body.classList.toggle('role-viewer',!adm);
  document.body.classList.toggle('role-admin',adm);
  document.getElementById('userInfo').textContent=curUser?curUser.username:'--';
}

function checkSession(){
  const s=sessionStorage.getItem('rosiere-session');
  if(s){try{curUser=JSON.parse(s);return true}catch(e){}}
  return false;
}

document.getElementById('loginBtn').addEventListener('click',doLogin);
document.getElementById('loginPwd').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
document.getElementById('loginUser').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginPwd').focus()});

// ─── User Management ───
function openUserMgmt(){if(!isAdmin())return;document.getElementById('umOv').classList.add('open');loadUsers()}
function closeUserMgmt(){document.getElementById('umOv').classList.remove('open')}

async function loadUsers(){
  try{
    const res=await fetch(SB_URL+'/rest/v1/users?select=id,username,role,created_at&order=created_at.asc',{headers:SB_READ});
    const users=await res.json();
    const list=document.getElementById('umList');
    list.innerHTML=users.map(u=>`<div class="um-row">
      <span class="um-name">${esc(u.username)}</span>
      <span class="um-role ${u.role}">${u.role}</span>
      ${u.username!=='admin'?`<button class="um-del" onclick="deleteUser('${u.id}')" title="Supprimer">&times;</button>`:''}
    </div>`).join('');
  }catch(e){toast('Erreur chargement utilisateurs')}
}

async function createUser(){
  const u=document.getElementById('umUser').value.trim();
  const p=document.getElementById('umPwd').value;
  const r=document.getElementById('umRole').value;
  if(!u||!p){toast('Pseudo et mot de passe requis');return}
  const h=await hashPwd(p);
  try{
    const res=await fetch(SB_URL+'/rest/v1/users',{method:'POST',headers:SB_HEADERS,
      body:JSON.stringify({username:u,password_hash:h,role:r})});
    if(!res.ok){const e=await res.json();toast(e.message||'Erreur');return}
    document.getElementById('umUser').value='';
    document.getElementById('umPwd').value='';
    loadUsers();toast('Compte "'+u+'" créé');
  }catch(e){toast('Erreur création')}
}

async function deleteUser(id){
  if(!confirm('Supprimer cet utilisateur ?'))return;
  try{
    await fetch(SB_URL+'/rest/v1/users?id=eq.'+id,{method:'DELETE',headers:SB_HEADERS});
    loadUsers();toast('Utilisateur supprimé');
  }catch(e){toast('Erreur suppression')}
}

// ─── Init ───
async function initApp(){
  initGrids();
  loadLocal();
  const lr=localStorage.getItem('rosiere-2026-images');
  if(lr)try{const d=JSON.parse(lr);if(Array.isArray(d))pageImages=d}catch(e){}
  renderAll();
  const ok=await sbLoad();
  if(ok)renderAll();
  await loadImages();
  renderAll();
}

/* Resize handler — re-render flipbook if open, recalc page scale */
let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{
    if(document.getElementById('fbOv').classList.contains('open')) renderFB();
  },150);
});

if(checkSession()){
  document.getElementById('loginOv').style.display='none';
  applyRole();
  initApp();
} else {
  initGrids();
}
